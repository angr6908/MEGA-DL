name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-latest  }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest  }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest }
          - { target: aarch64-pc-windows-msvc,    os: windows-latest }
          - { target: x86_64-apple-darwin,        os: macos-latest   }
          - { target: aarch64-apple-darwin,       os: macos-latest   }

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          EXT=""
          [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          cp "target/${{ matrix.target }}/release/mega-dl${EXT}" \
             "mega-dl-${{ github.ref_name }}-${{ matrix.target }}${EXT}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: mega-dl-${{ github.ref_name }}-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
